<!DOCTYPE html>

<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevvE & FIAS — Dashboard</title>
<!-- PWA / Home Screen Icon -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="DevvE×FIAS">
<meta name="theme-color" content="#1A4FDD">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #e8eaed;
    --bg2: #dde0e4;
    --bg3: #d0d4d9;
    --card: #f2f4f6;
    --border: #bcc1ca;
    --devve: #0088cc;
    --devve2: #006699;
    --fias: #e05a20;
    --fias2: #b84010;
    --text: #1a1e26;
    --muted: #5a6170;
    --green: #1a9e5a;
    --red: #d93030;
    --gold: #c47f00;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }
  .orb1 { width: 400px; height: 400px; background: rgba(0,136,204,0.08); top: -100px; left: -100px; }
  .orb2 { width: 350px; height: 350px; background: rgba(224,90,32,0.08); bottom: -80px; right: -80px; }

  /* ===== HEADER ===== */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(232,234,237,0.97);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 10px 0;
  }
  .header-row1 {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
  }

  .logo-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 1px;
  }

  .logo-text span:first-child { color: var(--devve); }
  .logo-text span:last-child { color: var(--fias); }

  .nav-tabs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
    background: var(--bg2);
    border-radius: 10px;
    padding: 4px;
    border: 1px solid var(--border);
  }

  /* Last 2 tabs span to center them on row 2 */
  .nav-tab:nth-child(4) { grid-column: 1; }
  .nav-tab:nth-child(5) { grid-column: 2; }

  .nav-tab {
    padding: 9px 4px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    text-align: center;
    width: 100%;
  }

  .nav-tab.active {
    background: var(--bg3);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .nav-tab:hover:not(.active) { color: var(--text); }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }

    .nav-tab {
      flex: 1;
      padding: 6px 4px;
      font-size: 11px;
      text-align: center;
      letter-spacing: 0;
    }
    /* Hide emoji on very small screens, keep text */
    .nav-tab { white-space: nowrap; overflow: hidden; }
  }

  .live-dot {
    width: 7px;
    height: 7px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* ===== MAIN ===== */
  main {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
  }

  /* Pages */
  .page { display: none; animation: fadeIn 0.3s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* ===== PRICE CARDS ===== */
  .price-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 20px;
  }

  .price-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .price-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .price-card.devve::before { background: linear-gradient(90deg, transparent, var(--devve), transparent); }
  .price-card.fias::before { background: linear-gradient(90deg, transparent, var(--fias), transparent); }

  .price-card:hover { border-color: var(--devve); }
  .price-card.fias:hover { border-color: var(--fias); }

  .coin-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .coin-identity {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .coin-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 13px;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .coin-avatar.devve {
    background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(0,144,200,0.3));
    border: 1.5px solid var(--devve);
    color: var(--devve);
  }

  .coin-avatar.fias {
    background: linear-gradient(135deg, rgba(255,107,53,0.2), rgba(204,74,21,0.3));
    border: 1.5px solid var(--fias);
    color: var(--fias);
  }

  .coin-name-wrap { line-height: 1; }
  .coin-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 18px; }
  .coin-fullname { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .coin-rank {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--bg3);
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .price-main {
    font-family: 'Share Tech Mono', monospace;
    font-size: 28px;
    font-weight: bold;
    line-height: 1;
    margin-bottom: 8px;
  }

  .price-main.devve { color: var(--devve); }
  .price-main.fias { color: var(--fias); }

  .price-meta {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .price-meta-item { display: flex; flex-direction: column; gap: 2px; }
  .meta-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
  .meta-value { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--text); }

  .change-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    font-weight: bold;
    padding: 4px 10px;
    border-radius: 6px;
  }

  .change-badge.up { background: rgba(0,230,118,0.12); color: var(--green); border: 1px solid rgba(0,230,118,0.2); }
  .change-badge.down { background: rgba(255,68,68,0.12); color: var(--red); border: 1px solid rgba(255,68,68,0.2); }
  .change-badge.flat { background: rgba(90,122,153,0.12); color: var(--muted); border: 1px solid rgba(90,122,153,0.2); }

  .mini-chart-wrap {
    height: 50px;
    margin-top: 14px;
  }

  /* ===== CHART SECTION ===== */
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .section-title::before {
    content: '';
    width: 3px;
    height: 20px;
    border-radius: 2px;
  }

  .section-title.devve::before { background: var(--devve); }
  .section-title.fias::before { background: var(--fias); }
  .section-title.mixed::before { background: linear-gradient(to bottom, var(--devve), var(--fias)); }

  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .chart-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .chart-coin-tabs {
    display: flex;
    gap: 6px;
  }

  .coin-tab {
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
  }

  .coin-tab.active.devve, .coin-tab:hover.devve { border-color: var(--devve); color: var(--devve); background: rgba(0,212,255,0.08); }
  .coin-tab.active.fias, .coin-tab:hover.fias { border-color: var(--fias); color: var(--fias); background: rgba(255,107,53,0.08); }
  .coin-tab.active.both { border-color: var(--gold); color: var(--gold); background: rgba(255,213,79,0.08); }

  .period-tabs {
    display: flex;
    gap: 4px;
  }

  .period-tab {
    padding: 4px 10px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
  }

  .period-tab.active, .period-tab:hover {
    background: var(--bg3);
    color: var(--text);
    border-color: rgba(200,223,240,0.3);
  }

  .chart-container { position: relative; height: 260px; }

  /* ===== STATS ROW ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    text-align: center;
  }

  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .stat-value { font-family: 'Share Tech Mono', monospace; font-size: 15px; color: var(--text); }
  .stat-sub { font-size: 10px; color: var(--muted); margin-top: 3px; }

  /* ===== INFO CARDS ===== */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px;
    margin-bottom: 20px;
  }

  .info-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .info-card h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .info-card p {
    font-size: 13px;
    line-height: 1.7;
    color: #8aa8c4;
  }

  .info-tag {
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    margin: 3px 3px 3px 0;
    border: 1px solid;
  }

  .info-tag.devve { color: var(--devve); border-color: rgba(0,212,255,0.3); background: rgba(0,212,255,0.05); }
  .info-tag.fias { color: var(--fias); border-color: rgba(255,107,53,0.3); background: rgba(255,107,53,0.05); }

  .link-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
  }

  .ext-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg3);
    transition: all 0.2s;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .ext-link:hover { color: var(--text); border-color: rgba(200,223,240,0.3); }
  .ext-link.devve:hover { border-color: var(--devve); color: var(--devve); }
  .ext-link.fias:hover { border-color: var(--fias); color: var(--fias); }

  /* ===== TELEGRAM SECTION ===== */
  .tg-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px;
    margin-bottom: 20px;
  }

  .tg-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .tg-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--bg3);
  }

  .tg-card-header h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tg-icon { font-size: 18px; }

  .tg-open-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;
    color: var(--muted);
    text-decoration: none;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 5px;
    transition: all 0.2s;
    background: transparent;
    cursor: pointer;
  }

  .tg-open-btn:hover { color: var(--devve); border-color: var(--devve); }

  .tg-embed {
    width: 100%;
    height: 500px;
    border: none;
    background: var(--bg2);
    display: block;
  }

  .tg-placeholder {
    padding: 20px;
    text-align: center;
  }

  .tg-placeholder p {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .tg-channel-input-wrap {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .tg-channel-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--text);
    outline: none;
  }

  .tg-channel-input:focus { border-color: var(--devve); }

  .tg-load-btn {
    padding: 8px 16px;
    background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(0,144,200,0.15));
    border: 1px solid var(--devve);
    border-radius: 8px;
    color: var(--devve);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tg-load-btn:hover { background: rgba(0,212,255,0.25); }

  .tg-presets {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tg-preset-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .tg-preset-btn:hover { border-color: var(--devve); color: var(--devve); }

  /* ===== PORTFOLIO ===== */
  .portfolio-form {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 14px;
  }

  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }

  .form-input {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus { border-color: var(--devve); }

  .calc-btn {
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(255,107,53,0.1));
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .calc-btn:hover { border-color: var(--devve); color: var(--devve); }

  .portfolio-result {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    display: none;
  }

  .portfolio-result.visible { display: block; animation: fadeIn 0.3s ease; }

  .result-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }

  .result-item {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }

  .result-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .result-value { font-family: 'Share Tech Mono', monospace; font-size: 18px; }
  .result-value.devve { color: var(--devve); }
  .result-value.fias { color: var(--fias); }
  .result-value.total { color: var(--gold); }
  .result-value.profit { color: var(--green); }
  .result-value.loss { color: var(--red); }

  /* ===== LOADING / ERROR ===== */
  .loading-shimmer {
    background: linear-gradient(90deg, var(--bg3) 25%, var(--border) 50%, var(--bg3) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
    height: 24px;
    width: 120px;
    display: inline-block;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .error-msg {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--red);
    background: rgba(255,68,68,0.08);
    border: 1px solid rgba(255,68,68,0.2);
    padding: 8px 12px;
    border-radius: 6px;
    margin-top: 8px;
  }

  .refresh-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    margin-left: auto;
  }

  .refresh-btn:hover { color: var(--text); border-color: rgba(200,223,240,0.3); }
  .refresh-btn.spinning svg { animation: spin 1s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* ===== PRICE TICKER ===== */
  .ticker-bar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    height: 32px;
    display: flex;
    align-items: center;
  }

  .ticker-inner {
    display: flex;
    gap: 40px;
    animation: ticker 30s linear infinite;
    white-space: nowrap;
  }

  @keyframes ticker {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .ticker-item {
    display: flex;
